name: Scan Architecture Center YAML Criteria

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pandas openpyxl

      - name: Run scanner (with debug)
        run: |
          python scripts/scan_architecture_center_yml.py --branch main --docs-root docs --output scan-results.json --debug

      - name: Convert results to Excel/CSVs
        run: |
          python scripts/convert_scan_results_to_excel.py --input scan-results.json --outdir .

      - name: Convert debug JSON to CSVs
        run: |
          python scripts/convert_debug_to_csv.py

      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            scan-results.json
            scan-results.xlsx
            scan-results_flat.csv
            scan-results_links.csv
            scan-results_images.csv

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-debug
          path: |
            scan-debug.json
            scan-debug_counts.csv
            scan-debug_skipped_sample.csv
