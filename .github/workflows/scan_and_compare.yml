name: Architecture Scan + Estimate Comparison
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml pandas openpyxl
      - name: Compile scripts (fail fast on syntax errors)
        run: |
          python -m py_compile scripts/scan_architecture_center_yml.py
          python -m py_compile scripts/build_scan_results_xlsx.py
          python -m py_compile scripts/run_compare_only.py
          python -m py_compile scripts/run_inventory_health.py
          python -m py_compile scripts/run_image_check.py

      # 1) Run the real scanner -> JSON
      - name: Run scanner (YML-based)
        run: python scripts/scan_architecture_center_yml.py --branch main --docs-root docs --output scan-results.json

      # 2) Convert JSON -> scan-results.xlsx with FIRST sheet named "scan-results"
      - name: Build scan-results.xlsx for comparison
        run: python scripts/build_scan_results_xlsx.py --input scan-results.json --output scan-results.xlsx

      # 3) Compare against estimate_scenarios.xlsx (must exist in repo root)
      - name: Compare with estimate scenarios
        run: python scripts/run_compare_only.py

      # 4) Inventory health check — reverse lookup + HTTP liveness for all
      #    scenarios already in estimate_scenarios.xlsx.
      #    --throttle controls the delay (seconds) between HTTP requests.
      - name: Run inventory health check
        run: python scripts/run_inventory_health.py --throttle 1

      # 5) Image change detection — hashes primary_image_path for each
      #    Published scenario and compares against stored baseline in
      #    estimate_scenarios.xlsx. Updates the baseline after each run.
      - name: Run image change detection
        run: python scripts/run_image_check.py --repo-root .

      # 6) Commit updated estimate_scenarios.xlsx (new hashes written by
      #    run_image_check.py) back to the repo so the next run has a
      #    fresh baseline. Skips the commit if nothing changed.
      - name: Commit updated image hashes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estimate_scenarios.xlsx
          git diff --cached --quiet || git commit -m "chore: update primary_image_sha256 baseline [skip ci]"
          git push

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: scan-results.xlsx
