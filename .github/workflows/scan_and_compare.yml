name: Architecture Scan + Estimate Comparison

on:
  workflow_dispatch:

# ✅ Opt into Node.js 24 now to avoid Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pandas openpyxl

      - name: Run Architecture Center scanner
        run: |
          python scan_architecture_center_yml.py --debug

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            scan-results.json
            scan-debug.json
